<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dust Off Agency — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-tertiary: #9b9b96;
      --border: rgba(0,0,0,0.12);
      --border-soft: rgba(0,0,0,0.07);
      --surface: #f5f4f0;
      --accent: #D85A30;
      --green: #1D9E75;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --text-primary: #f0ede6;
        --text-secondary: #9b9b96;
        --text-tertiary: #6b6b66;
        --border: rgba(255,255,255,0.12);
        --border-soft: rgba(255,255,255,0.07);
        --surface: #252522;
      }
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 100px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    .logo {
      font-size: clamp(44px, 10vw, 72px);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 36px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin-bottom: 2.5rem;
    }

    .headline {
      font-size: clamp(18px, 4vw, 22px);
      font-weight: 500;
      color: var(--text-primary);
      max-width: 400px;
      line-height: 1.4;
      margin-bottom: 0.75rem;
    }

    .subline {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 300px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .footer {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .footer a {
      font-size: 13px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: var(--text-primary);
    }

    .sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="content">
    <div class="badge">
      <div class="dot"></div>
      In Arbeit
    </div>

    <div class="logo">dust<span>off</span><br>agency</div>
    <div class="tagline">We're dusting things off.</div>
    <div class="divider"></div>

    <p class="headline">Etwas Großartiges entsteht hier</p>
    <p class="subline">Unsere Website ist in Vorbereitung.<br>Komm bald wieder.</p>

    <div class="footer">
      <a href="https://instagram.com/dustoffagency" target="_blank" rel="noopener">Instagram</a>
      <div class="sep"></div>
      <a href="mailto:hello@dustoffagency.com">Kontakt</a>
    </div>
  </div>
</body>
</html>
